name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: AI Code Review
        uses: coderabbitai/coderabbit-action@v1
        with:
          # Configuration for reading from .agent/rules/
          custom-instructions-file: '.agent/AGENTS.md'
